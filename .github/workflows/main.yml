name: YouTube Video Downloader Bot

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL of the YouTube video"
        required: true
        type: string

jobs:
  download_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup yt-dlp (patched)
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Download YouTube Video (480p)
        run: |
          set -x
          yt-dlp \
            -f "bestvideo[height<=480]+bestaudio/best[height<=480]" \
            -o "video_%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "video-${{ github.run_id }}"
          name: "Downloaded Video ${{ github.run_id }}"
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Video
        uses: softprops/action-gh-release@v1
        with:
          files: video_*.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
