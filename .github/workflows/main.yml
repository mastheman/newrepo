name: YouTube Video Downloader Bot

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL of the YouTube video"
        required: true
        type: string

jobs:
  download_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: pip install yt-dlp


      - name: Download YouTube Video (480p)
        run: |
          set -x
          yt-dlp \
            -f "bestvideo[height<=480]+bestaudio/best[height<=480]" \
            -o "video_%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"



      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "video-${{ github.run_id }}"
          release_name: "Downloaded Video ${{ github.run_id }}"
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Video to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: video_*.mp4
          asset_name: downloaded_video.mp4
          asset_content_type: video/mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
