name: YouTube Video Downloader Bot

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL of the YouTube video"
        required: true
        type: string

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup yt-dlp (with FFmpeg, aria2, EJS Node)
        uses: AnimMouse/setup-yt-dlp@v3
        # This automatically installs yt-dlp + recommended tools

      - name: Download YouTube Video (480p, MP4)
        run: |
          yt-dlp \
            --verbose \
            -f "bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best" \
            --merge-output-format mp4 \
            -o "video_%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "video-${{ github.run_id }}"
          release_name: "Downloaded Video ${{ github.run_id }}"
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Video to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: video_*.mp4
          asset_name: downloaded_video.mp4
          asset_content_type: video/mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
