name: YouTube Video Downloader Bot

on:
  workflow_dispatch: # Allows us to manually trigger it from the website
    with:
      video_url:
        required: true
        type: string

jobs:
  download_and_upload:
    runs-on: ubuntu-latest 

    steps:
      # Step 1: Get the code base onto the server's virtual machine
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Set up Python (the language we are using)
      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      # Step 3: Install the Bot (yt-dlp)
      - name: Install yt-dlp
        run: pip install yt-dlp

      # Step 4: THE MAGIC COMMAND! Run the download and save it to the repo.
      - name: Download YouTube Video (360p)
        run: |
          # This command fetches the video at 360p quality and names it neatly.
          yt-dlp -w "360" --output "video_%(title)s.mp4" "${{ github.event.inputs.video_url }}"

      # Step 5: Upload it as a Release Asset (Making it easy for others to grab!)
      - name: Upload Video to Release
        uses: actions/upload-release-asset@v1
        with:
          ::asset_path: video_*.mp4 
          ::asset_name: "Downloaded YouTube Video"
          ::draft: true # Keep it as a draft until you are ready to publish!
